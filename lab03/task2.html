<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Form with IDs</title>
</head>
<style>
    table {
        margin: 20px auto;
        text-align: left;
    }

</style>
<body>

<div>
    <form action="#" method="post">
        <table border="1" cellpadding="5">
            <caption>Варіант 1</caption>
            <tr>
                <td><label for="login1">Логін:</label></td>
                <td><input type="text" id="login1" name="login1"></td>
            </tr>

            <tr>
                <td><label for="pass1">Пароль:</label></td>
                <td><input type="password" id="pass1" name="pass1"></td>
            </tr>

            <tr>
                <td><label for="pass1_confirm">Повторіть пароль:</label></td>
                <td><input type="password" id="pass1_confirm" name="pass1_confirm"></td>
            </tr>

            <tr>
                <td>Стать:</td>
                <td>
                    <input type="radio" name="gender" id="male1" value="male">
                    <label for="male1">чоловік</label>
                    <input type="radio" name="gender" id="female1" value="female">
                    <label for="female1">жінка</label>
                </td>
            </tr>

            <tr>
                <td><label for="country1">Вкажіть країну:</label></td>
                <td>
                    <select id="country1" name="country1">
                        <option>Україна</option>
                        <option>Польща</option>
                        <option>Німеччина</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td><label for="about1">Про себе:</label></td>
                <td>
                    <textarea id="about1" name="about1" rows="3" cols="25">Я...</textarea>
                </td>
            </tr>

            <tr>
                <td></td>
                <td><input type="submit" value="Відправити"></td>
            </tr>
        </table>
    </form>

    <br><br>

    <form action="#" method="post">
        <table border="1" cellpadding="5">
            <caption>Варіант 2</caption>
            <tr>
                <td><label for="login2">Логін:</label></td>
                <td><input type="text" id="login2" name="login2"></td>
            </tr>

            <tr>
                <td><label for="pass2">Пароль:</label></td>
                <td><input type="password" id="pass2" name="pass2"></td>
            </tr>

            <tr>
                <td><label for="pass2_confirm">Повторіть пароль:</label></td>
                <td><input type="password" id="pass2_confirm" name="pass2_confirm"></td>
            </tr>

            <tr>
                <td>Стать:</td>
                <td>
                    <input type="radio" name="gender2" id="male2" value="male">
                    <label for="male2">чоловік</label>
                    <input type="radio" name="gender2" id="female2" value="female">
                    <label for="female2">жінка</label>
                </td>
            </tr>

            <tr>
                <td><label for="city2">Вкажіть місто:</label></td>
                <td>
                    <select size="3" id="city2" name="city2">
                        <option>Житомир</option>
                        <option>Київ</option>
                        <option>Львів</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Інтереси:</td>
                <td>
                    <input type="checkbox" id="interest1" name="interests" value="football">
                    <label for="interest1">футбол</label>

                    <input type="checkbox" id="interest2" name="interests" value="chess">
                    <label for="interest2">шахи</label>

                    <input type="checkbox" id="interest3" name="interests" value="drawing">
                    <label for="interest3">малювання</label>

                    <input type="checkbox" id="interest4" name="interests" value="music">
                    <label for="interest4">музика</label>
                </td>
            </tr>

            <tr>
                <td></td>
                <td>
                    <input type="reset" value="Очистити">
                    <input type="submit" value="Відправити">
                </td>
            </tr>
        </table>
    </form>
</div>

</body>
</html>
