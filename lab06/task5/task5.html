<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Реєстрація</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-card">
    <div class="form-section">
        <h2>Sign Up Today</h2>
        <p class="sub-text">The first 10 days are absolutely FREE!</p>

        <form>
            <label>What's your name?*</label>
            <input type="text" placeholder="Olivia Bennett">

            <label>Where can we email you?*</label>
            <input type="email" placeholder="hello@yourock.com">

            <label>Pick a password:*</label>
            <input type="password" placeholder="Make it a good one!">

            <div class="show-pw">
                <input type="checkbox"> Show password
            </div>

            <button type="button" class="btn-signup">Sign Up</button>

            <div class="login-link">
                Have an account?<br>
                <a href="#">Log in here!</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
