<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Анімована кнопка</title>

    <style>
        body {
            padding: 50px;
            font-family: Arial;
        }


        .btn {
            padding: 15px 40px;
            font-size: 24px;
            background-color: lightgray;
            color: black;
            border: 2px solid gray;
            cursor: pointer;

            transition: all 0.3s ease;
        }


        .btn:hover {
            background-color: red;
            color: white;
            border: 4px solid yellow;
        }
    </style>

</head>
<body>

<button class="btn">Button</button>

</body>
</html>
