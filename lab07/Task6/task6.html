<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Рух квадрата</title>

    <style>
        body {
            height: 100vh;
            margin: 0;
            position: relative;
        }


        .box {
            width: 80px;
            height: 80px;
            position: absolute;
            background: red;

            animation: move 4s infinite;
        }


        @keyframes move {
            0% {
                top: 0;
                left: 0;
                background: red;
            }

            25% {
                top: 0;
                left: 300px;
                background: blue;
            }

            50% {
                top: 300px;
                left: 300px;
                background: green;
            }

            75% {
                top: 300px;
                left: 0;
                background: orange;
            }

            100% {
                top: 0;
                left: 0;
                background: purple;
            }
        }
    </style>

</head>
<body>

<div class="box"></div>

</body>
</html>
