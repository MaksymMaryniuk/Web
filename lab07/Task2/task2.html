<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Ефект появи</title>

    <style>
        body {
            padding: 50px;
            font-family: Arial;
        }

        .box {
            width: 300px;
            height: 300px;
            border: none;
            overflow: visible;
            position: relative;
        }


        .box img {
            position: absolute;
            bottom: -150px;
            left: 50%;
            transform: translateX(-50%);

            transition: all 0.5s ease;
        }


        .box:hover img {
            bottom: 50px;
        }
    </style>

</head>
<body>

<div class="box">
    <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" width="120">
</div>

</body>
</html>
