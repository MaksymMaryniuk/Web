<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Обертання</title>

    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }


        .box {
            width: 100px;
            height: 100px;
            background: #4A90E2;

            animation: spin 5s infinite linear;
        }


        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            50% {
                transform: rotate(180deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .box:hover {
            animation-play-state: paused;
        }
    </style>

</head>
<body>

<div class="box"></div>

</body>
</html>
