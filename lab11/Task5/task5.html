<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>SCSS Grid Test</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .row {
            display: flex;
            flex-wrap: wrap;
        }

        [class*="col"] {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="row">
        <div class="col-12 col-sm-6 col-md-4 col-lg-3">1</div>
        <div class="col-12 col-sm-6 col-md-4 col-lg-3">2</div>
        <div class="col-12 col-sm-6 col-md-4 col-lg-3">3</div>
        <div class="col-12 col-sm-6 col-md-4 col-lg-3">4</div>
    </div>

    <div class="row">
        <div class="col-6 col-md-3">A</div>
        <div class="col-6 col-md-3">B</div>
        <div class="col-6 col-md-3">C</div>
        <div class="col-6 col-md-3">D</div>
    </div>

</div>
</body>
</html>
