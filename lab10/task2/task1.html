<!DOCTYPE html>
<html lang="uk">
<head>
    <title>Adaptive blocks</title>
    <meta charset="UTF-8">
    <style>
        .flex-container {
            display: flex;
            flex-wrap: wrap;
            list-style: none;
            padding: 0;
            background: #eee;
        }


        .flex-item {
            flex: 1 1 150px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ff6347;
            color: white;
            border: 1px solid white;
            font-size: 20px;
        }
    </style>
</head>
<body>

<ul class="flex-container">
    <li class="flex-item">1</li>
    <li class="flex-item">2</li>
    <li class="flex-item">3</li>
    <li class="flex-item">4</li>
    <li class="flex-item">5</li>
    <li class="flex-item">6</li>
</ul>

</body>
</html>
