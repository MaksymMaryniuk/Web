<!DOCTYPE html>
<html lang="uk">
<head>
    <title>Adaptive Flex</title>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            font-weight: bold;
            text-align: center;
        }

        .wrapper {
            display: flex;
            flex-wrap: wrap;
        }

        header, footer {
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            background: #00ffff;
        }

        footer {
            background: #0000ff;
            color: white;
        }

        .column {
            padding: 20px;
            box-sizing: border-box;
            min-height: 150px;
            flex: 1 1 auto;
        }

        .aside-1 {
            background: #ff00ff;
            width: 25%;
        }

        .main {
            background: #32cd32;
            width: 50%;
        }

        .aside-2 {
            background: #ffff00;
            width: 25%;
        }

        @media (max-width: 900px) {
            .aside-1 {
                width: 30%;
            }

            .main {
                width: 70%;
            }

            .aside-2 {
                width: 100%;
            }
        }

        @media (max-width: 600px) {
            .aside-1, .main, .aside-2 {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <header>Header</header>

    <aside class="column aside-1">Aside_1</aside>

    <main class="column main">
        Lorem, ipsum dolor sit amet consectetur adipisicing elit.
        Hic dicta quisquam asperiores nobis molestiae doloremque
        ea mollitia illum non itaque.
    </main>

    <aside class="column aside-2">Aside_2</aside>

    <footer>Footer</footer>
</div>

</body>
</html>
