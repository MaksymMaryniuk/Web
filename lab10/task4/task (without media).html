<!DOCTYPE html>
<html lang="uk">
<head>
    <title>Adaptive Flex</title>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            font-weight: bold;
            text-align: center;
        }

        .wrapper {
            display: flex;
            flex-wrap: wrap;
        }

        header, footer {
            flex: 1 0 100%;
            padding: 20px;
        }

        header {
            background: #00ffff;
        }

        footer {
            background: #0000ff;
            color: white;
        }

        .column {
            padding: 20px;
            box-sizing: border-box;
            flex: 1 1 250px;
            min-height: 150px;
        }

        .aside-1 {
            background: #ff00ff;
        }

        .main {
            background: #32cd32;
            flex-grow: 2;
        }

        /* Основний контент ширший */
        .aside-2 {
            background: #ffff00;
        }

    </style>
</head>
<body>

<div class="wrapper">
    <header>Header</header>

    <aside class="column aside-1">Aside_1</aside>

    <main class="column main">
        Lorem, ipsum dolor sit amet consectetur adipisicing elit.
        Hic dicta quisquam asperiores nobis molestiae doloremque...
    </main>

    <aside class="column aside-2">Aside_2</aside>

    <footer>Footer</footer>
</div>

</body>
</html>
