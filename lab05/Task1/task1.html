<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Форма</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<form>
    <table>

        <tr>
            <td>E-mail:</td>
            <td><input type="email" placeholder="Your E-mail"></td>
        </tr>

        <tr>
            <td>Пароль:</td>
            <td><input type="password" placeholder="Password"></td>
        </tr>

        <tr>
            <td>Повторіть пароль:</td>
            <td><input type="password" placeholder="Repeat password"></td>
        </tr>

        <tr>
            <td>Ім'я:</td>
            <td><input type="text" placeholder="Name"></td>
        </tr>

        <tr>
            <td>Прізвище:</td>
            <td><input type="text" placeholder="Surname"></td>
        </tr>

        <tr>
            <td>стать:</td>
            <td>
                <input type="radio" name="gender"> чоловіча
                <input type="radio" name="gender"> жіноча
            </td>
        </tr>

        <tr>
            <td>Місто:</td>
            <td>
                <select>
                    <option>Житомир</option>
                    <option>Київ</option>
                    <option>Львів</option>
                </select>
            </td>
        </tr>

        <tr>
            <td>Про себе:</td>
            <td><textarea></textarea></td>
        </tr>

        <tr>
            <td>Погодження:</td>
            <td>
                <input type="checkbox"> Отримувати розсилку<br>
                <input type="checkbox"> Погоджуюсь з правилами<br>
                <input type="checkbox"> Приховати профіль
            </td>
        </tr>

        <tr>
            <td></td>
            <td>
                <input type="submit" value="Зареєструватися">
                <input type="reset">
            </td>
        </tr>

    </table>
</form>

</body>
</html>
