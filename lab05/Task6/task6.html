<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Завдання 6: Градієнти</title>
    <style>
        body {
            display: flex;
            gap: 20px;
            padding: 40px;
            background-color: #fff;
        }


        div {
            width: 200px;
            height: 200px;
            border: 1px solid #ccc;
        }


        div:nth-of-type(1) {
            background: radial-gradient(circle, red 10%, lime 4%, blue 40%);
        }


        div:nth-of-type(2) {
            background: radial-gradient(circle, firebrick, orange, greenyellow);
        }


        div:nth-of-type(3) {
            background: linear-gradient(45deg, red 33%, yellow 33%, yellow 66%, lime 66%);
        }


        div:nth-of-type(4) {
            background: linear-gradient(to bottom right, magenta, blue, cyan, lime);
        }
    </style>
</head>
<body>

<div></div>
<div></div>
<div></div>
<div></div>
</body>
</html>
